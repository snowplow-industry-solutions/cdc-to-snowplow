services:
  postgres:
    image: postgres:16
    container_name: cdc-postgres
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: cdc
      POSTGRES_PASSWORD: cdc
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=4
      - -c
      - max_wal_senders=4
    volumes:
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init-orders.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdc -d orders_db"]
      interval: 2s
      timeout: 2s
      retries: 30
    ports:
      - "5432:5432"

  snowplow-micro:
    image: snowplow/snowplow-micro:2.1.2
    container_name: cdc-snowplow-micro
    volumes:
      - ./schemas:/config/iglu-client-embedded/schemas:ro
    ports:
      - "9090:9090"

  cdc-service:
    image: cdc-service:local
    container_name: cdc-service
    depends_on:
      postgres:
        condition: service_healthy
      snowplow-micro:
        condition: service_started
    environment:
      POSTGRES_PASSWORD: cdc
      COLLECTOR_URL: http://snowplow-micro:9090
    volumes:
      - cdc-offsets:/var/lib/cdc
      - ./examples/config.yaml:/etc/cdc-service/config.yaml:ro

volumes:
  cdc-offsets:
